seed: 42

data:
  root_dir: data/raw/chest_xray
  image_size: 224
  num_workers: 4
  batch_size: 32

model:
  name: resnet18
  num_classes: 1
  pretrained: true
  dropout: 0.2

train:
  epochs: 10
  lr: 0.0003
  weight_decay: 0.0001
  device: cuda

output:
  checkpoint_dir: outputs/checkpoints
  figure_dir: outputs/figures